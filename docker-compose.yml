version: '3.8'

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Ghi đè URL của Ollama để WebApp gọi đúng tên container trong mạng nội bộ
      - AiSettings__BaseUrl=http://ollama:11434/v1
    depends_on:
      - ollama
    networks:
      - rag_network

  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama_engine
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_VULKAN=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - rag_network

  # Container phụ này chỉ chạy 1 lần để tải các model bạn đang dùng về (llama3.2:1b và nomic-embed-text)
  ollama-pull-models:
    image: curlimages/curl:latest
    container_name: rag_ollama_pull_models
    depends_on:
      - ollama
    networks:
      - rag_network
    command: >
      sh -c "
      echo 'Đang chờ Ollama khởi động...' &&
      sleep 5 &&
      echo 'Đang tải model llama3.2:1b...' &&
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:1b\"}' &&
      echo 'Đang tải model nomic-embed-text...' &&
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}' &&
      echo 'Tất cả model đã sẵn sàng!'
      "

networks:
  rag_network:
    driver: bridge

volumes:
  ollama_data:

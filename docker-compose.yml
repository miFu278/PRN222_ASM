version: '3.8'

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Cấu hình chuỗi kết nối Database PostgreSQL (Ví dụ: Supabase hoặc Local DB)
      - ConnectionStrings__DefaultConnection=Host=YOUR_DB_HOST;Port=5432;Database=postgres;Username=postgres;Password=YOUR_PASSWORD
      # Cấu hình AI API
      - AiSettings__ApiKey=YOUR_AI_API_KEY
      - AiSettings__BaseUrl=https://generativelanguage.googleapis.com/v1beta/openai/
      # Cấu hình Supabase Cloud Storage
      - Supabase__Url=YOUR_SUPABASE_URL
      - Supabase__AnonKey=YOUR_SUPABASE_ANON_KEY
      # (Tùy chọn) Mật khẩu khởi tạo cho tài khoản admin mẫu
      - SEED_ADMIN_PASSWORD=admin123
